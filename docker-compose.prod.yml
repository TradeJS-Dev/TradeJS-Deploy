services:
  app:
    container_name: app
    restart: always
    mem_limit: ${APP_MEMORY_LIMIT:-5g}
    depends_on:
      redis:
        condition: service_healthy
      timescale:
        condition: service_healthy
      ml-infer:
        condition: service_started
    image: ghcr.io/tradejs-dev/tradejs-app:${APP_IMAGE_TAG}
    expose:
      - "3000"
      - "3001"
    env_file:
      - .env
      - release.env
    volumes:
      - ./data:/app/data
      - ./screenshots:/app/public/screenshots
      - ./.env:/app/.env:ro
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000 >/dev/null && curl -fsS http://127.0.0.1:3001/health >/dev/null",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  agent:
    container_name: agent
    restart: always
    mem_limit: ${AGENT_MEMORY_LIMIT:-4g}
    depends_on:
      redis:
        condition: service_healthy
      timescale:
        condition: service_healthy
      ml-infer:
        condition: service_started
    image: ghcr.io/tradejs-dev/tradejs-agent:${AGENT_IMAGE_TAG}
    env_file:
      - .env
      - release.env
    volumes:
      - ./data:/app/data
      - ./screenshots:/app/public/screenshots
      - ./.env:/app/.env:ro
      - ./tradejs-agent-repo/.git:/app/.git
      - ./agent-ssh:/root/.ssh:ro
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  site:
    container_name: site
    restart: always
    mem_limit: ${SITE_MEMORY_LIMIT:-512m}
    image: ghcr.io/tradejs-dev/tradejs-site:latest
    expose:
      - "3003"
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  docs:
    container_name: docs
    image: ghcr.io/tradejs-dev/tradejs-docs:latest
    restart: unless-stopped
    mem_limit: ${DOCS_MEMORY_LIMIT:-256m}
    expose:
      - "80"
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  timescale:
    container_name: inv-timescale
    image: timescale/timescaledb:latest-pg16
    mem_limit: ${TIMESCALE_MEMORY_LIMIT:-4g}
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/create.sql:/docker-entrypoint-initdb.d/01-create.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - web

  redis:
    image: redis/redis-stack:latest
    container_name: inv-redis
    restart: unless-stopped
    mem_limit: ${REDIS_MEMORY_LIMIT:-4g}
    expose:
      - "8001"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - web

  ml-infer:
    container_name: ml-infer
    image: ghcr.io/tradejs-dev/tradejs-ml-infer:${ML_INFER_IMAGE_TAG}
    restart: unless-stopped
    mem_limit: ${ML_INFER_MEMORY_LIMIT:-1g}
    environment:
      MODEL_DIR: /app/data/ml/models
      DEFAULT_STRATEGY: TrendLine
      ML_GRPC_HOST: 0.0.0.0
      ML_GRPC_PORT: 50051
    volumes:
      - ./data:/app/data
    expose:
      - "50051"
    networks:
      - web

  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: always
    mem_limit: ${NGINX_MEMORY_LIMIT:-256m}
    volumes:
      - ./nginx/nginx.conf.ssl:/etc/nginx/nginx.conf.ssl:ro
      - ./nginx/nginx.conf.nossl:/etc/nginx/nginx.conf.nossl:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    entrypoint: >
      sh -c "[ -f /etc/letsencrypt/live/tradejs.dev/fullchain.pem ]
      && cp /etc/nginx/nginx.conf.ssl /etc/nginx/nginx.conf
      || cp /etc/nginx/nginx.conf.nossl /etc/nginx/nginx.conf;
      nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
      - agent
      - site
      - docs
      - redis
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: certbot
    mem_limit: ${CERTBOT_MEMORY_LIMIT:-256m}
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "certbot certonly --webroot --webroot-path=/var/www/certbot
      --email aleksnick01@gmail.com --agree-tos --no-eff-email
      --non-interactive --expand --cert-name tradejs.dev
      -d tradejs.dev -d app.tradejs.dev -d redisinsight.tradejs.dev -d docs.tradejs.dev || true"
    networks:
      - web

  certbot-cron:
    image: certbot/certbot
    container_name: certbot-cron
    restart: on-failure
    mem_limit: ${CERTBOT_MEMORY_LIMIT:-256m}
    depends_on:
      - certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: sh -c "while true; do certbot renew --webroot -w /var/www/certbot && sleep 12h; done"
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  web:
    driver: bridge

volumes:
  pgdata:
  redisdata:
